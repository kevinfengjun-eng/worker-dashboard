name: 更新临时工看板

# 触发条件
on:
  # 当data目录下的Excel文件变更时自动触发
  push:
    paths:
      - 'data/*.xlsx'
      - 'data/*.xls'
      - 'worker_dashboard.html'
    branches:
      - main
  
  # 手动触发（用于强制重新构建）
  workflow_dispatch:

# 权限设置（允许Action提交代码）
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: 检出代码
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史，便于后续commit
      
      # Step 2: 设置Python环境
      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      # Step 3: 安装依赖
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl
      
      # Step 4: 查找最新的Excel文件
      - name: 查找Excel文件
        id: find_excel
        run: |
          # 查找data目录下最新的Excel文件
          EXCEL_FILE=$(find data -name "*.xlsx" -o -name "*.xls" | head -1)
          if [ -z "$EXCEL_FILE" ]; then
            echo "未找到Excel文件，跳过构建"
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "找到Excel文件: $EXCEL_FILE"
            echo "excel_file=$EXCEL_FILE" >> $GITHUB_OUTPUT
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi
      
      # Step 5: 生成嵌入版HTML
      - name: 生成看板HTML
        if: steps.find_excel.outputs.should_build == 'true'
        run: |
          python generate_embedded.py "${{ steps.find_excel.outputs.excel_file }}" index.html
      
      # Step 6: 提交并更新GitHub Pages
      - name: 提交更新
        if: steps.find_excel.outputs.should_build == 'true'
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          
          # 检查是否有变更
          if git diff --quiet index.html; then
            echo "无变更，跳过提交"
          else
            git add index.html
            git commit -m "自动更新看板: $(date '+%Y-%m-%d %H:%M')"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      # Step 7: 等待GitHub Pages构建（提示信息）
      - name: 构建完成
        if: steps.find_excel.outputs.should_build == 'true'
        run: |
          echo "=========================================="
          echo "看板已更新!"
          echo "GitHub Pages将在1-2分钟内完成构建"
          echo "访问链接: https://kevinfengjun-eng.github.io/worker-dashboard/"
          echo "=========================================="
